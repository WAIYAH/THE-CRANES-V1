<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Meet the Kanunka FC first team squad. Player profiles, statistics, and positions for The Cranes roster.">
  <title>First Team Squad | Kanunka FC - The Cranes</title>
  <meta property="og:title" content="First Team Squad | Kanunka FC - The Cranes">
  <meta property="og:description" content="Meet the Kanunka FC first team squad. Player profiles, statistics, and positions for The Cranes roster.">
  <meta property="og:image" content="https://kanunkafc.com/img/craneslogo.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="First Team Squad | Kanunka FC">
  <meta name="twitter:description" content="View the Kanunka FC first team squad and player statistics.">
  <link rel="canonical" href="https://kanunkafc.com/players.html">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="img/craneslogo.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="dns-prefetch" href="//cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>
  <main>
    <header class="page-hero">
      <h1>First Team Squad</h1>
      <p>Meet the players who wear The Cranes crest with pride</p>
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="index.html">Home</a>
        <span>/</span>
        <span aria-current="page">Players</span>
      </nav>
    </header>

    <!-- Filters -->
    <section class="section" style="padding-bottom: 1rem;">
      <div class="container">
        <div style="display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; justify-content: center; margin-bottom: 1rem;" class="reveal">
          <input type="text" id="search-bar" class="form-input" placeholder="Search players..." style="max-width: 280px;">
          <select id="position-filter" class="form-select" style="max-width: 200px;">
            <option value="all">All Positions</option>
            <option value="Goalkeeper">Goalkeeper</option>
            <option value="Defender">Defender</option>
            <option value="Midfielder">Midfielder</option>
            <option value="Forward">Forward</option>
          </select>
        </div>
        <div class="filter-group reveal">
          <button class="filter-pill active" data-pos="all">All</button>
          <button class="filter-pill" data-pos="Goalkeeper">Goalkeepers</button>
          <button class="filter-pill" data-pos="Defender">Defenders</button>
          <button class="filter-pill" data-pos="Midfielder">Midfielders</button>
          <button class="filter-pill" data-pos="Forward">Forwards</button>
        </div>
      </div>
    </section>

    <!-- Players Grid -->
    <section class="section" style="padding-top: 0;">
      <div class="container">
        <div class="grid grid-4 reveal" id="players-container"></div>
        <p id="no-results" style="text-align: center; color: var(--color-text-muted); display: none; padding: 2rem;">No players match your search criteria.</p>
      </div>
    </section>

    <!-- Squad Stats -->
    <section class="section" style="background: var(--color-dark); color: #f1f5f9;">
      <div class="container">
        <div class="section-header reveal">
          <h2 style="color: #fff;">Squad Overview</h2>
          <div class="accent-line"></div>
        </div>
        <div style="display: flex; justify-content: center; gap: 3rem; flex-wrap: wrap;" class="reveal">
          <div style="text-align: center;"><div class="stat-number">20</div><div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-top: 0.25rem;">Players</div></div>
          <div style="text-align: center;"><div class="stat-number">25</div><div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-top: 0.25rem;">Goals</div></div>
          <div style="text-align: center;"><div class="stat-number">23</div><div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-top: 0.25rem;">Avg Age</div></div>
          <div style="text-align: center;"><div class="stat-number">8</div><div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-top: 0.25rem;">Matches</div></div>
        </div>
      </div>
    </section>
  </main>

  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script defer src="js/app.js"></script>
  <script defer src="js/players.js"></script>
</body>
</html>
