<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Latest news, match reports, transfer updates, and club announcements from Kanunka FC - The Cranes.">
  <title>Latest News | Kanunka FC - The Cranes</title>
  <link rel="icon" href="img/craneslogo.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css">

</head>
<body>

    <header class="page-hero">
      <h1>Latest News</h1>
      <p>Match reports, transfers, and everything Cranes</p>

        <div class="filter-group reveal">

        <div class="grid grid-3 reveal" id="news-grid"></div>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

</html>
